spring:
  application:
    name: SmartBot
  datasource:
    url: jdbc:mysql://localhost:3306/chatbot_db
    username: root
    password: 20031207
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: mySecretKeyForJWTTokenGenerationAndValidationPurposeOnlyDoNotUseInProduction
    expiration: 86400000

logging:
  level:
    root: INFO
    com.chatbot: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO